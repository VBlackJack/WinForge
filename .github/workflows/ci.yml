name: Win11Forge CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]
  schedule:
    # Run security scan weekly on Sundays at 2am UTC
    - cron: '0 2 * * 0'

jobs:
  # ===========================================
  # Security Analysis (CodeQL SAST)
  # ===========================================
  security:
    name: CodeQL Security Analysis
    runs-on: windows-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout ThemeForge (sibling dependency)
        uses: actions/checkout@v4
        with:
          repository: VBlackJack/ThemeForge
          path: ThemeForge

      - name: Guard packages.lock.json RID neutrality
        shell: pwsh
        run: .\Tools\Test-PackagesLockRidNeutrality.ps1 -Path GUI

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
          queries: security-extended, security-and-quality

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore GUI/Win11Forge.slnx --locked-mode

      - name: Scan for vulnerable dependencies
        shell: pwsh
        run: |
          $output = dotnet list GUI/Win11Forge.slnx package --vulnerable --include-transitive 2>&1 | Out-String
          Write-Host $output
          if ($output -match 'has the following vulnerable packages') {
            Write-Host "::error::Vulnerable NuGet packages detected"
            exit 1
          }
          Write-Host "No vulnerable packages found"

      - name: Build for CodeQL Analysis
        run: dotnet build GUI/Win11Forge.slnx --configuration Release --no-restore

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:csharp"
  # ===========================================
  # PowerShell Linting
  # ===========================================
  lint:
    name: PSScriptAnalyzer
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = @()
          $paths = @('Core', 'Modules', 'Tests', 'Tools')

          # Use local settings file if available, with additional CI-specific exclusions
          $excludeRules = @(
            'PSAvoidUsingWriteHost',
            'PSUseSingularNouns',
            'PSUseBOMForUnicodeEncodedFile',
            'PSUseShouldProcessForStateChangingFunctions',
            'PSUseProcessBlockForPipelineCommand',
            'PSAvoidAssignmentToAutomaticVariable',
            'PSAvoidUsingInvokeExpression',
            'PSReviewUnusedParameter',
            'PSAvoidUsingBrokenHashAlgorithms',
            'PSUseToExportFieldsInManifest',
            'PSPossibleIncorrectComparisonWithNull',
            'PSAvoidDefaultValueSwitchParameter',
            'PSUseDeclaredVarsMoreThanAssignments',
            'PSUseUsingScopeModifierInNewRunspaces',
            'PSUseApprovedVerbs',
            'PSUseSupportsShouldProcess'
          )

          foreach ($path in $paths) {
            if (Test-Path $path) {
              $issues = Invoke-ScriptAnalyzer -Path $path -Recurse -Severity Error,Warning `
                -ExcludeRule $excludeRules
              $results += $issues
            }
          }

          if ($results.Count -gt 0) {
            Write-Host "PSScriptAnalyzer found $($results.Count) issue(s):" -ForegroundColor Red
            $results | Format-Table -AutoSize -Wrap
            exit 1
          }

          Write-Host "PSScriptAnalyzer: No issues found" -ForegroundColor Green

      - name: Lint French diacritics
        shell: pwsh
        run: |
          .\Tools\lint-fr-diacritics.ps1 -Path 'GUI\Win11Forge.GUI\Resources\Resources.fr.resx'

      - name: Assert explicit types (no var)
        shell: pwsh
        run: .\Tools\Assert-ExplicitTypes.ps1 -Path 'GUI'

  # ===========================================
  # PowerShell Pester Tests with Code Coverage
  # ===========================================
  test-powershell:
    name: Pester Tests
    runs-on: windows-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module -Name Pester -Force -Scope CurrentUser -MinimumVersion 5.0.0

      - name: Run Pester Tests with Code Coverage
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = 'Tests'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Normal'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = 'TestResults-Pester.xml'
          $config.TestResult.OutputFormat = 'NUnitXML'

          # Enable code coverage
          $config.CodeCoverage.Enabled = $true
          $config.CodeCoverage.Path = @('Core/*.psm1', 'Modules/*.psm1')
          $config.CodeCoverage.OutputPath = 'Coverage-Pester.xml'
          $config.CodeCoverage.OutputFormat = 'JaCoCo'
          $config.CodeCoverage.CoveragePercentTarget = 40

          Invoke-Pester -Configuration $config

      - name: Generate Pester Coverage Report
        shell: pwsh
        if: always()
        continue-on-error: true  # Coverage may be below threshold in CI environment
        run: |
          if (Test-Path 'Coverage-Pester.xml') {
            [xml]$coverage = Get-Content 'Coverage-Pester.xml'
            $counters = $coverage.report.counter | Where-Object { $_.type -eq 'LINE' }
            if ($counters) {
              $covered = [int]$counters.covered
              $missed = [int]$counters.missed
              $total = $covered + $missed
              $percentage = if ($total -gt 0) { [math]::Round(($covered / $total) * 100, 2) } else { 0 }
              $minCoverage = 40
              Write-Host "=== PowerShell Code Coverage ===" -ForegroundColor Cyan
              Write-Host "Lines Covered: $covered / $total ($percentage%) (minimum: $minCoverage%)" -ForegroundColor $(if ($percentage -ge $minCoverage) { 'Green' } elseif ($percentage -ge 70) { 'Yellow' } else { 'Red' })

              # Create coverage summary JSON
              @{
                Type = 'PowerShell'
                LineCoverage = $percentage
                LinesCovered = $covered
                LinesTotal = $total
                MinimumCoverage = $minCoverage
              } | ConvertTo-Json | Set-Content 'coverage-summary-pester.json'

              # Enforce minimum coverage threshold
              if ($percentage -lt $minCoverage) {
                Write-Host "::error::PowerShell line coverage ($percentage%) is below minimum threshold ($minCoverage%)" -ForegroundColor Red
                exit 1
              }
            }
          }

      - name: Upload Pester Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pester-test-results
          path: TestResults-Pester.xml

      - name: Upload Pester Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pester-coverage
          path: |
            Coverage-Pester.xml
            coverage-summary-pester.json

  # ===========================================
  # .NET 10 GUI Build & Test with Code Coverage
  # ===========================================
  test-gui:
    name: GUI Build & Test (.NET 10)
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout ThemeForge (sibling dependency)
        uses: actions/checkout@v4
        with:
          repository: VBlackJack/ThemeForge
          path: ThemeForge

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Guard packages.lock.json RID neutrality
        shell: pwsh
        run: .\Tools\Test-PackagesLockRidNeutrality.ps1 -Path GUI

      - name: Restore dependencies
        run: dotnet restore GUI/Win11Forge.slnx --locked-mode

      - name: Build GUI (Release)
        run: dotnet build GUI/Win11Forge.slnx --configuration Release --no-restore

      - name: Run GUI Tests with Code Coverage
        timeout-minutes: 20
        run: |
          dotnet test GUI/Win11Forge.GUI.Tests/Win11Forge.GUI.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=TestResults-GUI.trx" --collect:"XPlat Code Coverage" --results-directory GUI/Win11Forge.GUI.Tests/TestResults --blame-hang --blame-hang-timeout 120s --blame-hang-dump-type mini

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate Coverage Report
        shell: pwsh
        run: |
          $coverageFile = Get-ChildItem -Path 'GUI/Win11Forge.GUI.Tests/TestResults' -Filter 'coverage.cobertura.xml' -Recurse | Select-Object -First 1
          if ($coverageFile) {
            reportgenerator -reports:$($coverageFile.FullName) -targetdir:coverage-report-gui -reporttypes:"Html;JsonSummary;Cobertura"

            # Parse and display coverage summary
            if (Test-Path 'coverage-report-gui/Summary.json') {
              $summary = Get-Content 'coverage-report-gui/Summary.json' | ConvertFrom-Json
              $lineCoverage = $summary.summary.linecoverage
              $branchCoverage = $summary.summary.branchcoverage
              $minCoverage = 10
              $targetCoverage = 80

              Write-Host "=== .NET GUI Code Coverage ===" -ForegroundColor Cyan
              Write-Host "Line Coverage: $lineCoverage% (minimum: $minCoverage%, target: $targetCoverage%)" -ForegroundColor $(if ($lineCoverage -ge $targetCoverage) { 'Green' } elseif ($lineCoverage -ge $minCoverage) { 'Yellow' } else { 'Red' })
              Write-Host "Branch Coverage: $branchCoverage%" -ForegroundColor $(if ($branchCoverage -ge 70) { 'Green' } elseif ($branchCoverage -ge 60) { 'Yellow' } else { 'Red' })

              # Enforce minimum coverage threshold
              if ($lineCoverage -lt $minCoverage) {
                Write-Host "::error::Line coverage ($lineCoverage%) is below minimum threshold ($minCoverage%)" -ForegroundColor Red
                exit 1
              } elseif ($lineCoverage -lt $targetCoverage) {
                Write-Host "::warning::Line coverage ($lineCoverage%) is below target threshold ($targetCoverage%)" -ForegroundColor Yellow
              }

              # Create coverage summary JSON
              @{
                Type = '.NET'
                LineCoverage = $summary.summary.linecoverage
                BranchCoverage = $summary.summary.branchcoverage
                CoveredLines = $summary.summary.coveredlines
                TotalLines = $summary.summary.coverablelines
                MinimumCoverage = $minCoverage
                TargetCoverage = $targetCoverage
              } | ConvertTo-Json | Set-Content 'coverage-summary-gui.json'
            }
          } else {
            Write-Host "No coverage file found" -ForegroundColor Yellow
          }

      - name: Upload GUI Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gui-test-results
          path: GUI/Win11Forge.GUI.Tests/TestResults/TestResults-GUI.trx

      - name: Upload GUI Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gui-coverage
          path: |
            coverage-report-gui/
            coverage-summary-gui.json

  # ===========================================
  # Combined Code Coverage Summary
  # ===========================================
  coverage-summary:
    name: Code Coverage Summary
    runs-on: windows-latest
    needs: [test-powershell, test-gui]
    if: always()
    steps:
      - name: Download Pester Coverage
        uses: actions/download-artifact@v4
        with:
          name: pester-coverage
          path: pester-coverage
        continue-on-error: true

      - name: Download GUI Coverage
        uses: actions/download-artifact@v4
        with:
          name: gui-coverage
          path: gui-coverage
        continue-on-error: true

      - name: Generate Combined Coverage Summary
        shell: pwsh
        run: |
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "       WIN11FORGE CODE COVERAGE         " -ForegroundColor Cyan
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host ""

          $combinedSummary = @{
            Timestamp = Get-Date -Format 'yyyy-MM-dd HH:mm:ss'
            Components = @()
          }

          # PowerShell Coverage
          if (Test-Path 'pester-coverage/coverage-summary-pester.json') {
            $pester = Get-Content 'pester-coverage/coverage-summary-pester.json' | ConvertFrom-Json
            Write-Host "PowerShell (Pester):" -ForegroundColor White
            Write-Host "  Line Coverage: $($pester.LineCoverage)%" -ForegroundColor $(if ($pester.LineCoverage -ge 80) { 'Green' } elseif ($pester.LineCoverage -ge 60) { 'Yellow' } else { 'Red' })
            Write-Host "  Lines: $($pester.LinesCovered) / $($pester.LinesTotal)" -ForegroundColor Gray
            Write-Host ""
            $combinedSummary.Components += $pester
          } else {
            Write-Host "PowerShell (Pester): No coverage data available" -ForegroundColor Yellow
          }

          # .NET Coverage
          if (Test-Path 'gui-coverage/coverage-summary-gui.json') {
            $gui = Get-Content 'gui-coverage/coverage-summary-gui.json' | ConvertFrom-Json
            Write-Host ".NET GUI (xUnit):" -ForegroundColor White
            Write-Host "  Line Coverage: $($gui.LineCoverage)%" -ForegroundColor $(if ($gui.LineCoverage -ge 80) { 'Green' } elseif ($gui.LineCoverage -ge 60) { 'Yellow' } else { 'Red' })
            Write-Host "  Branch Coverage: $($gui.BranchCoverage)%" -ForegroundColor $(if ($gui.BranchCoverage -ge 80) { 'Green' } elseif ($gui.BranchCoverage -ge 60) { 'Yellow' } else { 'Red' })
            Write-Host "  Lines: $($gui.CoveredLines) / $($gui.TotalLines)" -ForegroundColor Gray
            Write-Host ""
            $combinedSummary.Components += $gui
          } else {
            Write-Host ".NET GUI (xUnit): No coverage data available" -ForegroundColor Yellow
          }

          # Calculate overall average
          $coverages = $combinedSummary.Components | Where-Object { $_.LineCoverage -gt 0 } | Select-Object -ExpandProperty LineCoverage
          if ($coverages.Count -gt 0) {
            $average = [math]::Round(($coverages | Measure-Object -Average).Average, 2)
            $combinedSummary.OverallCoverage = $average
            Write-Host "----------------------------------------" -ForegroundColor Gray
            Write-Host "Overall Average: $average%" -ForegroundColor $(if ($average -ge 80) { 'Green' } elseif ($average -ge 60) { 'Yellow' } else { 'Red' })
          }

          Write-Host "========================================" -ForegroundColor Cyan

          # Save combined summary
          $combinedSummary | ConvertTo-Json -Depth 5 | Set-Content 'coverage-summary-combined.json'

      - name: Upload Combined Coverage Summary
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage-summary-combined.json

  # ===========================================
  # Framework Validation
  # ===========================================
  validate:
    name: Framework Validation
    runs-on: windows-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Version Consistency
        shell: pwsh
        run: |
          if (Test-Path 'Tools/Verify-VersionConsistency.ps1') {
            & 'Tools/Verify-VersionConsistency.ps1'
            if ($LASTEXITCODE -ne 0) {
              Write-Host "Version consistency check failed" -ForegroundColor Red
              exit 1
            }
          }

      - name: Validate App Database
        shell: pwsh
        run: |
          if (Test-Path 'Tools/Validate-AppDatabase.ps1') {
            & 'Tools/Validate-AppDatabase.ps1'
            if ($LASTEXITCODE -ne 0) {
              Write-Host "App database validation failed" -ForegroundColor Red
              exit 1
            }
          }

  # ===========================================
  # Release Build (on tags or main)
  # ===========================================
  deploy:
    name: Build Release Package
    runs-on: windows-latest
    needs: [test-powershell, test-gui, validate, security]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout ThemeForge (sibling dependency)
        uses: actions/checkout@v4
        with:
          repository: VBlackJack/ThemeForge
          path: ThemeForge

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Pester (for Build-Release tests)
        shell: pwsh
        run: |
          Install-Module -Name Pester -Force -Scope CurrentUser -MinimumVersion 5.0.0

      - name: Build Release Package
        shell: pwsh
        run: |
          .\Build-Release.ps1 -SkipTests

      - name: Get Version
        id: version
        shell: pwsh
        run: |
          $versionFile = "Config/version.json"
          if (Test-Path $versionFile) {
            $version = (Get-Content $versionFile -Raw | ConvertFrom-Json).Version
          } else {
            $version = "3.0.0"
          }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Win11Forge_v${{ steps.version.outputs.VERSION }}
          path: Dist/Win11Forge_v${{ steps.version.outputs.VERSION }}.zip
          retention-days: 30
